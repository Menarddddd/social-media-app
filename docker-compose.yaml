version: "3.9"

services:
  db:
    image: postgres:16
    container_name: social_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    build: ./ollama
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"

  web:
    build:
      context: .
      dockerfile: fastapi/Dockerfile
    container_name: social_api
    depends_on:
      - db
      - ollama
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/mydb
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      EXPIRE_MINUTES: ${EXPIRE_MINUTES}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  ollama_data:
